name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run local tests
        run: |
          python -m pytest tests/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: patelgrisha
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t patelgrisha/ci-cd-pipeline:latest .

      - name: Test Docker container
        run: |
          docker run --name test-container -d patelgrisha/ci-cd-pipeline:latest
          # Copy tests into container (if needed)
          docker cp tests/. test-container:/app/tests
          # Run tests inside container
          docker exec test-container python -m pytest /app/tests
          docker stop test-container
          docker rm test-container

      - name: Push Docker image
        run: |
          docker push patelgrisha/ci-cd-pipeline:latest
          